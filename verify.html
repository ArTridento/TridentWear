<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Verify your email to continue." />
    <title>Verify Email | TridentWear</title>
    <link rel="stylesheet" href="./css/styles.css?v=20260416-1" />
    <link rel="icon" type="image/png" href="./images/Logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body data-page="auth">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <img src="./images/Logo.png" alt="TridentWear Logo" class="brand-logo" />
          <span class="brand-name">
            <span class="brand-trident">Trident</span><span class="brand-wear">Wear</span>
          </span>
        </a>
        <button class="mobile-toggle" type="button" data-mobile-toggle aria-label="Open navigation">
          <span class="mobile-toggle-line"></span><span class="mobile-toggle-line"></span><span class="mobile-toggle-line"></span>
        </button>
        <nav class="site-nav" data-mobile-nav>
          <a class="nav-link" href="index.html" data-nav-link="home">Home</a>
          <a class="nav-link" href="products.html" data-nav-link="products">Shop</a>
          <a class="nav-link" href="about.html" data-nav-link="about">About</a>
          <a class="nav-link" href="contact.html" data-nav-link="contact">Contact</a>
        </nav>
      </div>
    </header>

    <main class="auth-page-main">
      <div class="auth-split">
        <!-- Left Brand Panel -->
        <div class="auth-brand-panel">
          <div class="auth-brand-inner">
            <div class="auth-brand-logo">
              <span class="brand-name" style="font-size: 2rem">
                <span class="brand-trident" style="color: #fff">Trident</span><span class="brand-wear" style="color: var(--secondary)">Wear</span>
              </span>
            </div>
            <h2 class="auth-brand-headline">
              Dress like the<br /><span style="color: var(--secondary)">streets.</span>
            </h2>
            <p class="auth-brand-copy">
              Verifying your email gives you full access to TridentWear ordering and tracking.
            </p>
          </div>
        </div>

        <!-- Right Form Panel -->
        <div class="auth-form-panel">
          <div class="auth-form-inner">
            <div class="auth-form-header">
              <h1 class="auth-form-title">Verify Email</h1>
              <p class="auth-form-sub" id="verify-email-display">Enter the 6-digit OTP sent to your email</p>
            </div>

            <form class="auth-form" data-verify-form>
              <div class="form-group full">
                <label class="label" for="verify-otp">Security Code</label>
                <div class="input-icon-wrap" style="justify-content:center;">
                  <input
                    class="field"
                    style="text-align: center; letter-spacing: 0.5rem; font-size: 1.5rem; font-weight:700;"
                    id="verify-otp"
                    type="text"
                    required
                    minlength="6"
                    maxlength="6"
                    inputmode="numeric"
                    placeholder="------"
                  />
                </div>
              </div>
              
              <button class="btn btn-primary btn-full" type="submit">
                <i class="fa-solid fa-check-circle"></i> Verify & Activate
              </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider"><span>or</span></div>

            <p class="auth-switch-text">
              Wrong email address?
              <a href="register.html" class="auth-switch-link">Register Again</a>
            </p>
          </div>
        </div>
      </div>
    </main>
    
    <script>
      const params = new URLSearchParams(window.location.search);
      if(params.get("email")) {
        const el = document.getElementById("verify-email-display");
        if(el) el.innerHTML = `Enter the 6-digit OTP sent to <strong>${params.get("email")}</strong>`;
      }
    </script>
    <script type="module" src="./js/pages/verify.js"></script>
  </body>
</html>
