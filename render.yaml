services:
  - type: web
    name: tridentwear
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TRIDENT_JWT_SECRET
        generateValue: true
      - key: TRIDENT_SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: tridentwear-db
      mountPath: /opt/render/project/src/db
      sizeGB: 1
