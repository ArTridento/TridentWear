<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/login">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TRIDENT Wear account access now lives on the dedicated login and register pages.">
  <title>Account Redirect | TRIDENT Wear</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script>
    window.location.replace(`/login${window.location.search}`);
  </script>
</head>
<body data-page="auth">
  <main class="section">
    <div class="container">
      <div class="page-hero-panel">
        <span class="eyebrow">Redirecting</span>
        <h1 class="page-title">Taking you to <span class="accent">login</span>.</h1>
        <p class="page-copy">If the redirect does not start automatically, use one of the links below.</p>
        <div class="hero-actions">
          <a class="btn btn-primary" href="/login">Login</a>
          <a class="btn btn-outline" href="/register">Register</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
