<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Page not found. Return to TridentWear homepage or browse the product catalog."
    />
    <title>404 - Page Not Found | TridentWear</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260424-mobile-grid" />
    <link rel="icon" type="image/png" href="/assets/images/Logo.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body data-page="404">
        {{ component:header }}

    <main>
      <div class="error-page">
        <div class="error-code reveal-scale">404</div>
        <h1 class="error-title reveal">Page Not Found</h1>
        <p class="error-copy reveal">
          The page you're looking for doesn't exist or has been moved. Let's get
          you back on track.
        </p>
        <div class="error-actions reveal">
          <a class="btn btn-primary" href="/">Back to Home</a>
          <a class="btn btn-outline" href="/products">Browse Products</a>
        </div>
      </div>
    </main>

    <div class="footer-top-strip">
      <div class="container">
        <span>🇮🇳 Proudly Made in India — Wear the Pride</span>
      </div>
    </div>
        {{ component:footer }}

    <script type="module">
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add("is-visible");
              observer.unobserve(e.target);
            }
          });
        },
        { threshold: 0.08 },
      );
      document
        .querySelectorAll(".reveal, .reveal-scale")
        .forEach((el) => observer.observe(el));
    </script>
  </body>
</html>
