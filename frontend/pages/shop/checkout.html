<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Complete your TridentWear order — choose COD or online payment, apply coupons."
    />
    <title>Checkout | TridentWear</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260424-mobile-grid" />
    <link rel="icon" type="image/png" href="/assets/images/Logo.png" />
    <!-- Razorpay SDK - loads only when needed -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body data-page="checkout">
        {{ component:header }}

    <!-- Checkout Progress Stepper -->
    <div class="checkout-stepper">
      <div class="container">
        <div class="stepper-row">
          <div class="stepper-step stepper-done">
            <div class="stepper-circle"><i class="fa-solid fa-check"></i></div>
            <span class="stepper-label">Cart</span>
          </div>
          <div class="stepper-line stepper-line-done"></div>
          <div class="stepper-step stepper-active">
            <div class="stepper-circle">2</div>
            <span class="stepper-label">Details</span>
          </div>
          <div class="stepper-line"></div>
          <div class="stepper-step">
            <div class="stepper-circle">3</div>
            <span class="stepper-label">Confirm</span>
          </div>
        </div>
      </div>
    </div>
    <main>
      <section class="page-hero">
        <div class="container">
          <div class="page-hero-panel reveal-scale">
            <span class="eyebrow">Checkout</span>
            <h1 class="page-title">
              Complete your <span class="accent">order</span>.
            </h1>
            <p class="page-copy">
              Secure checkout with Cash on Delivery or Online Payment.
            </p>
          </div>
        </div>
      </section>

      <section class="section" data-animate="fade-up">
        <div class="container checkout-shell">
          <div data-order-status></div>

          <!-- Order Summary -->
          <div class="checkout-panel reveal-scale checkout-stack">
            <div class="section-header checkout-section-header">
              <span class="eyebrow">Order Summary</span>
            </div>
            <div data-cart-summary></div>
          </div>

          <!-- Coupon -->
          <div class="checkout-panel reveal-scale checkout-stack">
            <div class="section-header checkout-section-header">
              <span class="eyebrow">Have a Coupon?</span>
            </div>
            <div class="checkout-inline">
              <input
                class="field checkout-code-input"
                id="coupon-code"
                type="text"
                placeholder="Enter coupon code"
              />
              <button class="btn btn-outline" type="button" data-coupon-apply>
                Apply
              </button>
            </div>
            <p data-coupon-msg class="checkout-note"></p>
          </div>

          <!-- Payment Method -->
          <div class="checkout-panel reveal-scale checkout-stack">
            <div class="section-header checkout-section-header">
              <span class="eyebrow">Payment Method</span>
            </div>
            <div class="payment-options">
              <label class="payment-option" id="opt-cod">
                <input type="radio" name="payment" value="cod" checked />
                <div class="payment-option-content">
                  <div class="payment-option-icon">🏦</div>
                  <div>
                    <div class="payment-option-title">Cash on Delivery</div>
                    <div class="payment-option-desc">
                      Pay when your order arrives
                    </div>
                  </div>
                </div>
              </label>
              <label class="payment-option" id="opt-online">
                <input type="radio" name="payment" value="online" />
                <div class="payment-option-content">
                  <div class="payment-option-icon">💳</div>
                  <div>
                    <div class="payment-option-title">Pay Online</div>
                    <div class="payment-option-desc">
                      UPI, Cards, Net Banking via Razorpay
                    </div>
                  </div>
                </div>
              </label>
            </div>
          </div>

          <!-- Shipping Form -->
          <div class="checkout-panel reveal-scale">
            <div class="section-header checkout-section-header">
              <span class="eyebrow">Shipping Details</span>
              <h2 class="section-title">Where should we send it?</h2>
            </div>
            <form class="form-grid" data-checkout-form>
              <div class="form-group">
                <label class="label" for="checkout-name">Full Name</label
                ><input class="field" id="checkout-name" type="text" required />
              </div>
              <div class="form-group">
                <label class="label" for="checkout-email">Email</label
                ><input
                  class="field"
                  id="checkout-email"
                  type="email"
                  required
                />
              </div>
              <div class="form-group">
                <label class="label" for="checkout-phone">Phone</label
                ><input class="field" id="checkout-phone" type="tel" required />
              </div>
              <div class="form-group">
                <label class="label" for="checkout-city">City</label
                ><input class="field" id="checkout-city" type="text" required />
              </div>
              <div class="form-group full">
                <label class="label" for="checkout-address">Address</label
                ><textarea
                  class="textarea"
                  id="checkout-address"
                  required
                ></textarea>
              </div>
              <div class="form-group">
                <label class="label" for="checkout-postal">Postal Code</label
                ><input class="field" id="checkout-postal" type="text" />
              </div>
              <div class="form-group">
                <label class="label" for="checkout-country">Country</label
                ><input
                  class="field"
                  id="checkout-country"
                  type="text"
                  value="India"
                />
              </div>
              <div class="form-group full">
                <label class="label" for="checkout-notes">Order Notes</label
                ><textarea
                  class="textarea"
                  id="checkout-notes"
                  placeholder="Any delivery notes or fit preferences?"
                ></textarea>
              </div>
              <div class="form-group full">
                <button
                  class="btn btn-primary checkout-submit"
                  type="submit"
                  data-checkout-button
                >
                  Place Order (COD)
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div class="footer-top-strip">
      <div class="container">
        <span>🇮🇳 Proudly Made in India — Wear the Pride</span>
      </div>
    </div>
        {{ component:footer }}

    <button
      class="back-to-top"
      type="button"
      data-back-to-top
      aria-label="Back to top"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="18 15 12 9 6 15" />
      </svg>
    </button>

    <script type="module" src="/assets/js/pages/checkout.js?v=20260423-frontend"></script>
    <script>
      // Update button label when payment method changes
      document.addEventListener("change", (e) => {
        if (e.target.name === "payment") {
          const btn = document.querySelector("[data-checkout-button]");
          btn.textContent =
            e.target.value === "cod" ? "Place Order (COD)" : "Pay Online";
        }
      });
    </script>
  </body>
</html>
