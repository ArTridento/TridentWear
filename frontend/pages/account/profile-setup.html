<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Set up your profile to continue." />
    <title>Profile Setup | TridentWear</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260423-frontend" />
    <link rel="icon" type="image/png" href="/assets/images/Logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body data-page="auth">
    <main class="auth-page-main">
      <div class="auth-split">
        <!-- Left Brand Panel -->
        <div class="auth-brand-panel">
          <div class="auth-brand-inner">
            <div class="auth-brand-logo">
              <span class="brand-name" style="font-size: 2rem">
                <span class="brand-trident" style="color: #fff">Trident</span><span class="brand-wear" style="color: var(--secondary)">Wear</span>
              </span>
            </div>
            <h2 class="auth-brand-headline">
              Almost<br /><span style="color: var(--secondary)">Done!</span>
            </h2>
            <p class="auth-brand-copy">
              Please complete your profile to continue to your dashboard. This helps us personalize your account.
            </p>
          </div>
        </div>

        <!-- Right Form Panel -->
        <div class="auth-form-panel">
          <div class="auth-form-inner">
            <div class="auth-form-header">
              <h1 class="auth-form-title">Profile Setup</h1>
              <p class="auth-form-sub">Select your title and optional contact info</p>
            </div>

            <form class="auth-form" data-setup-form>
              <div class="form-group full">
                <label class="label">Title</label>
                <div style="display:flex; gap:1.5rem; margin-top:0.5rem;">
                  <label style="cursor:pointer; display:flex; align-items:center; gap:0.5rem;"><input type="radio" name="title" value="Mr" checked> Mr.</label>
                  <label style="cursor:pointer; display:flex; align-items:center; gap:0.5rem;"><input type="radio" name="title" value="Miss"> Miss.</label>
                  <label style="cursor:pointer; display:flex; align-items:center; gap:0.5rem;"><input type="radio" name="title" value="Other"> Other</label>
                </div>
              </div>
              
              <div class="form-group full">
                <label class="label" for="setup-mobile">Mobile Number (Optional)</label>
                <div class="input-icon-wrap">
                  <i class="fa-solid fa-phone input-icon"></i>
                  <input
                    class="field field-icon"
                    type="tel"
                    id="setup-mobile"
                    placeholder="10-digit number"
                  />
                </div>
              </div>
              
              <button class="btn btn-primary btn-full" type="submit" style="margin-top: 1rem;">
                <i class="fa-solid fa-arrow-right"></i> Complete Setup
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
    
    <script type="module" src="/assets/js/pages/profile-setup.js?v=20260423-frontend"></script>
  </body>
</html>
